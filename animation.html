<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 100px;
  height: 100px;
  background-color: coral;
  position: relative;
  animation: moveBox 3s infinite alternate;
}

@keyframes moveBox {
  from { left: 0px; }
  to { left: 300px; }
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
